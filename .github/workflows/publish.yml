name: publish pypi

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish, with or without a leading v"
        required: true
        type: string

permissions: {}

jobs:
  setup_release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
            version="${version#v}"
            release_tag="v${version}"
          else
            release_tag="${GITHUB_REF_NAME}"
          fi
          if [ -z "$release_tag" ] || [ "$release_tag" = "v" ]; then
            echo "Unable to resolve release tag" >&2
            exit 1
          fi
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${{ steps.release.outputs.release_tag }}" --generate-notes

  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    needs: [setup_release]
    environment:
      name: pypi
      url: https://pypi.org/p/hatchery-core
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install build deps
        run: uv pip install --system build twine

      - name: Set VERSION from release ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          version="${version#v}"
          if [ -z "$version" ]; then
            echo "Unable to resolve release version" >&2
            exit 1
          fi
          printf '%s\n' "$version" > VERSION
          echo "Building hatchery-core version $version"

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: twine check dist/*

      - name: Inspect wheel contents
        run: |
          python -m zipfile -l dist/*.whl
          python - <<'PY'
          import glob
          import zipfile

          [wheel] = glob.glob("dist/*.whl")
          names = set(zipfile.ZipFile(wheel).namelist())
          required = {
              "hatchery/core/examples/train_sft.py",
              "hatchery/core/scripts/run_local_dev.sh",
              "hatchery/core/scripts/run_worker.sh",
          }
          missing = sorted(required - names)
          if missing:
              raise SystemExit(f"missing wheel files: {missing}")
          PY

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
